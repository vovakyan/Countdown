<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Countdowns</title>
    <!-- Google Fonts: Outfit for a modern, sleek look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- PWA Setup & App Icons -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/jpeg" href="images/PXL_20240524_142058096.jpg">
    <link rel="apple-touch-icon" href="images/PXL_20240524_142058096.jpg">
    <meta name="theme-color" content="#ec4899">

    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="bgSlideshow" class="bg-slideshow"></div>
    <div class="app-container">
        <button id="enableNotificationsBtn" class="primary-btn outline" style="display: none; position: absolute; top: -0.5rem; right: 0; z-index: 100; border-radius: 50%; padding: 0.75rem; width: 44px; height: 44px; justify-content: center; align-items: center;" title="Enable Push Notifications">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
        </button>

        <header>
            <div class="header-content">
                <h1>While Dad Was Gone...Countdown</h1>
                <p>Shared moments, tracked together.</p>
            </div>
            <div class="header-actions">
                <div id="userProfile" class="user-profile" style="display: none;">
                    <span id="userName"></span>
                    <button id="signOutBtn" class="text-btn">Sign Out</button>
                </div>
                <a href="https://photos.app.goo.gl/1sQfQFrnqqGujFp2A" target="_blank" id="familyAlbumBtn"
                    class="primary-btn outline"
                    style="text-decoration: none; display: none; align-items: center; gap: 0.5rem;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                        <polyline points="21 15 16 10 5 21"></polyline>
                    </svg>
                    Family Album
                </a>
                <button id="signInBtn" class="primary-btn outline" style="display: none;">
                    Sign in with Google
                </button>
                <button id="addEventBtn" class="primary-btn" style="display: none;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Add Date
                </button>
            </div>
        </header>

        <div class="controls-bar">
            <div class="search-wrapper">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="searchInput" placeholder="Search events..." autocomplete="off">
            </div>
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all">All</button>
                <button class="filter-tab" data-filter="active">Active</button>
                <button class="filter-tab" data-filter="completed">Completed</button>
            </div>
        </div>

        <div style="position: relative; width: 100%;">
            <!-- Global Timeline -->
            <div id="globalTimeline" class="global-timeline">
                <div class="timeline-date top-date">
                    <span>Jul 14</span>
                    <span class="year">2026</span>
                </div>
                <div class="timeline-track">
                    <div id="timelineTodayMarker" class="timeline-marker today-marker">
                        <span class="pulse"></span>
                        <span class="label">Today</span>
                    </div>
                </div>
                <div class="timeline-date bottom-date">
                    <span>May 20</span>
                    <span class="year">2027</span>
                </div>
            </div>

            <main id="countdownsContainer" class="countdowns-grid">
                <!-- Countdowns will be injected here via JavaScript -->
                <div class="loading">Loading countdowns...</div>
            </main>
        </div>
    </div>

    <!-- Add Event Modal -->
    <div id="addEventModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">New Countdown</h2>
                <button id="closeModalBtn" class="close-btn">&times;</button>
            </div>
            <form id="addEventForm">
                <div class="form-group">
                    <label for="eventName">What are we waiting for?</label>
                    <input type="text" id="eventName" required placeholder="e.g., Trip to Japan, Graduation"
                        autocomplete="off">
                </div>
                <div class="form-group">
                    <label>When is it?</label>
                    <div class="date-type-toggle" style="display: flex; gap: 1rem; margin-bottom: 0.75rem;">
                        <label style="display: flex; align-items: center; gap: 0.4rem; cursor: pointer;">
                            <input type="radio" name="dateType" value="date" checked> Date Only
                        </label>
                        <label style="display: flex; align-items: center; gap: 0.4rem; cursor: pointer;">
                            <input type="radio" name="dateType" value="datetime"> Specific Time
                        </label>
                    </div>
                    <input type="date" id="eventDateOnly" required>
                    <input type="datetime-local" id="eventDateTime" style="display: none;">
                </div>
                <div class="form-actions">
                    <button type="submit" id="submitBtn" class="submit-btn">Create Countdown</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase SDK (v9 compat) -->
    <script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <!-- Confetti -->
    <script defer src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- Application Logic -->
    <script defer src="app.js"></script>
</body>

</html>
