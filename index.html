<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Countdowns</title>
    <!-- Google Fonts: Outfit for a modern, sleek look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-content">
                <h1>Countdowns</h1>
                <p>Shared moments, tracked together.</p>
            </div>
            <div class="header-actions">
                <div id="userProfile" class="user-profile" style="display: none;">
                    <span id="userName"></span>
                    <button id="signOutBtn" class="text-btn">Sign Out</button>
                </div>
                <button id="signInBtn" class="primary-btn outline" style="display: none;">
                    Sign in with Google
                </button>
                <button id="addEventBtn" class="primary-btn" style="display: none;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    Add Date
                </button>
            </div>
        </header>

        <main id="countdownsContainer" class="countdowns-grid">
            <!-- Countdowns will be injected here via JavaScript -->
            <div class="loading">Loading countdowns...</div>
        </main>
    </div>

    <!-- Add Event Modal -->
    <div id="addEventModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">New Countdown</h2>
                <button id="closeModalBtn" class="close-btn">&times;</button>
            </div>
            <form id="addEventForm">
                <div class="form-group">
                    <label for="eventName">What are we waiting for?</label>
                    <input type="text" id="eventName" required placeholder="e.g., Trip to Japan, Graduation" autocomplete="off">
                </div>
                <div class="form-group">
                    <label>When is it?</label>
                    <div class="date-type-toggle" style="display: flex; gap: 1rem; margin-bottom: 0.75rem;">
                        <label style="display: flex; align-items: center; gap: 0.4rem; cursor: pointer;">
                            <input type="radio" name="dateType" value="date" checked> Date Only
                        </label>
                        <label style="display: flex; align-items: center; gap: 0.4rem; cursor: pointer;">
                            <input type="radio" name="dateType" value="datetime"> Specific Time
                        </label>
                    </div>
                    <input type="date" id="eventDateOnly" required>
                    <input type="datetime-local" id="eventDateTime" style="display: none;">
                </div>
                <div class="form-actions">
                    <button type="submit" id="submitBtn" class="submit-btn">Create Countdown</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase SDK (v9 compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <!-- Application Logic -->
    <script src="app.js"></script>
</body>
</html>
